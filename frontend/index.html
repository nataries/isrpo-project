<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ставки на спорт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽Sports Betting</h1>
            <div class="balance-card">
                <div class="balance-label">Ваш баланс</div>
                <div class="balance-amount" id="balanceAmount">10 000</div>
                <div class="balance-currency">монет</div>
                <button id="resetBalanceBtn" class="reset-btn">Сбросить баланс</button>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все матчи</button>
            <button class="filter-btn" data-filter="Champions League">🏆 Лига Чемпионов</button>
            <button class="filter-btn" data-filter="La Liga">Ла Лига</button>
        </div>

        <div id="loadingText" class="loading-text">Загружаем матчи...</div>
        <ul id="matchesList" class="matches-list"></ul>
    </div>

    <div id="betModal" class="modal">
        <div class="modal-content">
            <h2>Сделать ставку</h2>
            <div id="modalMatchInfo" class="modal-match-info"></div>
            
            <div class="bet-amount-input">
                <label>Сумма ставки (монет):</label>
                <input type="number" id="betAmount" min="10" step="10" placeholder="Введите сумму (мин. 10)">
                <button id="confirmBetBtn" class="confirm-bet-btn">✅ Подтвердить ставку</button>
            </div>
            
            <div id="betError" class="bet-error"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
